<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPMN Modeler</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- BPMN-JS Styles -->
    <link rel="stylesheet" href="https://unpkg.com/bpmn-js@17.7.1/dist/assets/diagram-js.css" />
    <link rel="stylesheet" href="https://unpkg.com/bpmn-js@17.7.1/dist/assets/bpmn-js.css" />
    <link rel="stylesheet" href="https://unpkg.com/bpmn-js@17.7.1/dist/assets/bpmn-font/css/bpmn.css" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
        }
        
        #canvas {
            width: 100%;
            height: calc(100vh - 4rem);
            background-color: #ffffff;
            background-image: 
                radial-gradient(#e2e8f0 1.2px, transparent 1.2px);
            background-size: 24px 24px;
        }

        .bjs-powered-by { display: none; }

        /* Estilos del Validador (Linter) */
        .linter-badge {
            background: #ef4444;
            color: white;
            border-radius: 9999px;
            width: 20px;
            height: 20px;
            text-align: center;
            font-weight: 700;
            font-size: 11px;
            line-height: 20px;
            cursor: help;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            border: 2px solid white;
        }
        .linter-warning { background: #f59e0b; }

        /* Scrollbar Personalizado */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden text-slate-900">

    <!-- Header Principal -->
    <header class="bg-slate-900 text-white h-16 flex items-center justify-between px-6 shadow-xl z-30 shrink-0">
        <div class="flex items-center space-x-4">
            <div class="bg-blue-600 p-2 rounded-lg shadow-inner">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
            </div>
            <div>
                <h1 class="text-sm font-bold leading-tight tracking-tight uppercase opacity-90">BPMN Modeler</h1>
                <p class="text-[10px] text-slate-400 font-medium tracking-wide">EDICIÓN LIBRE</p>
            </div>
        </div>

        <!-- Acciones Superiores -->
        <div class="flex items-center space-x-4">
            <!-- Grupo: Archivo -->
            <div class="flex bg-slate-800 p-1 rounded-lg border border-slate-700">
                <button id="btn-import" class="p-2 hover:bg-slate-700 rounded-md transition-colors" title="Importar XML">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                </button>
                <button id="btn-new" class="p-2 hover:bg-slate-700 rounded-md transition-colors" title="Nuevo Diagrama">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                </button>
                <button id="btn-example" class="p-2 hover:bg-slate-700 rounded-md transition-colors" title="Cargar Ejemplo">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
                </button>
            </div>

            <div class="h-6 w-px bg-slate-700"></div>

            <!-- Grupo: Inteligencia de Diseño -->
            <div class="flex items-center space-x-2">
                <button id="btn-color-theme" class="flex items-center space-x-2 px-3 py-1.5 bg-orange-600 hover:bg-orange-500 rounded-md transition-all text-xs font-semibold shadow-lg shadow-orange-900/20">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"/></svg>
                    <span class="hidden lg:inline">Colores Bizagi</span>
                </button>
                <button id="btn-auto-layout" class="flex items-center space-x-2 px-3 py-1.5 bg-indigo-600 hover:bg-indigo-500 rounded-md transition-all text-xs font-semibold shadow-lg shadow-indigo-900/20">
                    <svg id="icon-layout" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                    <span class="hidden lg:inline">Auto-Diseño</span>
                </button>
                <button id="btn-toggle-linter" class="flex items-center space-x-2 px-3 py-1.5 bg-slate-700 border border-slate-600 rounded-md text-xs font-semibold">
                    <div id="linter-indicator" class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                    <span id="linter-text" class="hidden lg:inline">Linter ON</span>
                </button>
            </div>

            <div class="h-6 w-px bg-slate-700"></div>

            <!-- Grupo: Exportación -->
            <div class="flex bg-slate-800 p-1 rounded-lg border border-slate-700">
                <button id="btn-download-xml" class="px-3 py-1.5 hover:bg-slate-700 rounded-md text-[10px] font-bold uppercase tracking-wider transition-colors">XML</button>
                <button id="btn-download-svg" class="px-3 py-1.5 hover:bg-slate-700 rounded-md text-[10px] font-bold uppercase tracking-wider transition-colors">SVG</button>
                <button id="btn-export-doc" class="flex items-center space-x-2 px-3 py-1.5 bg-emerald-600 hover:bg-emerald-500 rounded-md text-[10px] font-bold uppercase tracking-wider transition-colors shadow-lg shadow-emerald-900/20">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                    <span>Manual</span>
                </button>
            </div>
        </div>
        
        <input type="file" id="file-input" accept=".bpmn, .xml" class="hidden" />
    </header>

    <div class="flex flex-1 overflow-hidden relative">
        <main id="canvas" class="flex-grow h-full relative"></main>

        <!-- Toolbar Flotante Contextual -->
        <div id="align-toolbar" class="absolute top-6 left-1/2 transform -translate-x-1/2 glass-panel shadow-2xl border border-slate-200/50 px-4 py-3 rounded-2xl z-40 flex items-center space-x-4 transition-all duration-300 opacity-0 pointer-events-none -translate-y-4 scale-95">
            <!-- Paleta Manual -->
            <div class="flex items-center space-x-2.5 border-r border-slate-200 pr-4">
                <button onclick="colorSelected(null, null)" class="w-6 h-6 rounded-full border border-slate-300 bg-white hover:scale-110 transition shadow-sm"></button>
                <button onclick="colorSelected('#bbdefb', '#0d47a1')" class="w-6 h-6 rounded-full bg-blue-200 border border-blue-400 hover:scale-110 transition shadow-sm"></button>
                <button onclick="colorSelected('#fff9c4', '#f57f17')" class="w-6 h-6 rounded-full bg-yellow-100 border border-yellow-400 hover:scale-110 transition shadow-sm"></button>
                <button onclick="colorSelected('#c8e6c9', '#1b5e20')" class="w-6 h-6 rounded-full bg-green-200 border border-green-400 hover:scale-110 transition shadow-sm"></button>
                <button onclick="colorSelected('#ffcdd2', '#b71c1c')" class="w-6 h-6 rounded-full bg-red-200 border border-red-400 hover:scale-110 transition shadow-sm"></button>
            </div>

            <!-- Alineación -->
            <div class="flex items-center space-x-1 text-slate-500">
                <button onclick="alignSelected('left')" class="p-2 hover:bg-slate-100 hover:text-blue-600 rounded-lg transition" title="Izquierda"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="2" x2="4" y2="22"></line><rect x="8" y="6" width="10" height="4"></rect><rect x="8" y="14" width="14" height="4"></rect></svg></button>
                <button onclick="alignSelected('center')" class="p-2 hover:bg-slate-100 hover:text-blue-600 rounded-lg transition" title="Centro Vertical"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="2" x2="12" y2="22"></line><rect x="7" y="6" width="10" height="4"></rect><rect x="5" y="14" width="14" height="4"></rect></svg></button>
                <button onclick="alignSelected('top')" class="p-2 hover:bg-slate-100 hover:text-blue-600 rounded-lg transition" title="Arriba"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="2" y1="4" x2="22" y2="4"></line><rect x="6" y="8" width="4" height="10"></rect><rect x="14" y="8" width="4" height="14"></rect></svg></button>
                <button onclick="alignSelected('middle')" class="p-2 hover:bg-slate-100 hover:text-blue-600 rounded-lg transition" title="Centro Horizontal"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="2" y1="12" x2="22" y2="12"></line><rect x="6" y="7" width="4" height="10"></rect><rect x="14" y="5" width="4" height="14"></rect></svg></button>
            </div>

            <!-- Distribución -->
            <div class="flex items-center space-x-1 border-l border-slate-200 pl-4 text-slate-500">
                <button onclick="distributeSelected('horizontal')" class="p-2 hover:bg-slate-100 hover:text-blue-600 rounded-lg transition" title="Distribuir H"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="6" width="4" height="12"></rect><rect x="10" y="6" width="4" height="12"></rect><rect x="17" y="6" width="4" height="12"></rect></svg></button>
                <button onclick="distributeSelected('vertical')" class="p-2 hover:bg-slate-100 hover:text-blue-600 rounded-lg transition" title="Distribuir V"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="3" width="12" height="4"></rect><rect x="6" y="10" width="12" height="4"></rect><rect x="6" y="17" width="12" height="4"></rect></svg></button>
            </div>
        </div>

        <!-- Panel de Propiedades (Inspector) -->
        <aside id="properties-panel" class="w-80 bg-white border-l border-slate-200 flex flex-col shadow-2xl z-20 absolute right-0 top-0 bottom-0 transition-transform duration-300 translate-x-full">
            <div class="p-5 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center">
                <div class="flex items-center space-x-2">
                    <div class="w-2 h-2 rounded-full bg-blue-500"></div>
                    <h2 class="text-xs font-bold uppercase tracking-widest text-slate-400">Inspector</h2>
                </div>
                <button id="btn-close-panel" class="p-1 hover:bg-slate-200 rounded-full transition-colors">
                    <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            
            <div class="p-6 space-y-8 overflow-y-auto flex-1">
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold uppercase text-slate-400 block mb-1.5 tracking-tighter">Nombre del Elemento</label>
                        <div id="element-name" class="p-3 bg-slate-50 border border-slate-200 rounded-lg text-sm font-semibold text-slate-700 min-h-[44px]">Cargando...</div>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold uppercase text-slate-400 block mb-1.5 tracking-tighter">Tipo BPMN</label>
                        <span id="element-type" class="inline-block px-2.5 py-1 bg-blue-50 text-blue-600 rounded-md text-[10px] font-bold border border-blue-100 uppercase">Task</span>
                    </div>
                </div>

                <div class="h-px bg-slate-100"></div>

                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold uppercase text-slate-400 block mb-1.5 tracking-tighter">Procedimiento Detallado</label>
                        <textarea id="element-desc" class="w-full h-64 p-4 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-600 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all placeholder:text-slate-400 shadow-inner" placeholder="Instrucciones paso a paso..."></textarea>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Watermark -->
        <div class="absolute bottom-6 left-6 z-20 pointer-events-none">
            <div class="flex items-center space-x-3 bg-white/60 backdrop-blur-md px-4 py-2 rounded-full border border-slate-200/50 text-[10px] font-medium text-slate-400 shadow-sm">
                <span>© 2026 Raúl A. Risco Castillo</span>
                <span class="w-1 h-1 bg-slate-300 rounded-full"></span>
                <span>MIT Licensed</span>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/bpmn-js@17.7.1/dist/bpmn-modeler.development.js"></script>
    
    <script>
        // --- 1. EJEMPLO INICIAL ---
        const processEjemploXML = `<?xml version="1.0" encoding="UTF-8"?>
        <bpmn:definitions xmlns:bpmn="http://www.omg.org/spec/BPMN/20100524/MODEL" xmlns:bpmndi="http://www.omg.org/spec/BPMN/20100524/DI" xmlns:dc="http://www.omg.org/spec/DD/20100524/DC" xmlns:di="http://www.omg.org/spec/DD/20100524/DI" xmlns:bioc="http://bpmn.io/schema/bpmn/biocolor/1.0" id="Definitions_1" targetNamespace="http://bpmn.io/schema/bpmn">
          <bpmn:collaboration id="Collaboration_1">
            <bpmn:participant id="Participant_Empresa" name="Proceso de Pagos" processRef="Process_1" />
            <bpmn:participant id="Participant_Proveedor" name="Proveedor Externo" />
            <bpmn:messageFlow id="Flow_Msg1" sourceRef="Participant_Proveedor" targetRef="StartEvent_1" />
          </bpmn:collaboration>
          <bpmn:process id="Process_1" isExecutable="false">
            <bpmn:laneSet id="LaneSet_1">
              <bpmn:lane id="Lane_CxP" name="Cuentas por Pagar"><bpmn:flowNodeRef>StartEvent_1</bpmn:flowNodeRef><bpmn:flowNodeRef>Task_1</bpmn:flowNodeRef><bpmn:flowNodeRef>Task_3</bpmn:flowNodeRef></bpmn:lane>
              <bpmn:lane id="Lane_Gerencia" name="Gerencia Financiera"><bpmn:flowNodeRef>Task_4</bpmn:flowNodeRef><bpmn:flowNodeRef>Gateway_2</bpmn:flowNodeRef><bpmn:flowNodeRef>EndEvent_2</bpmn:flowNodeRef></bpmn:lane>
              <bpmn:lane id="Lane_ERP" name="Sistema ERP"><bpmn:flowNodeRef>Task_2</bpmn:flowNodeRef><bpmn:flowNodeRef>Gateway_1</bpmn:flowNodeRef><bpmn:flowNodeRef>EndEvent_1</bpmn:flowNodeRef><bpmn:flowNodeRef>Task_5</bpmn:flowNodeRef><bpmn:flowNodeRef>EndEvent_3</bpmn:flowNodeRef></bpmn:lane>
            </bpmn:laneSet>
            <bpmn:startEvent id="StartEvent_1" name="Factura Recibida"><bpmn:outgoing>Flow_1</bpmn:outgoing></bpmn:startEvent>
            <bpmn:task id="Task_1" name="Registrar Factura"><bpmn:incoming>Flow_1</bpmn:incoming><bpmn:outgoing>Flow_2</bpmn:outgoing></bpmn:task>
            <bpmn:task id="Task_2" name="Validar OC"><bpmn:incoming>Flow_2</bpmn:incoming><bpmn:outgoing>Flow_3</bpmn:outgoing></bpmn:task>
            <bpmn:exclusiveGateway id="Gateway_1" name="¿OK?"><bpmn:incoming>Flow_3</bpmn:incoming><bpmn:outgoing>Flow_4</bpmn:outgoing><bpmn:outgoing>Flow_5</bpmn:outgoing></bpmn:exclusiveGateway>
            <bpmn:endEvent id="EndEvent_1" name="Error"><bpmn:incoming>Flow_5</bpmn:incoming></bpmn:endEvent>
            <bpmn:task id="Task_3" name="Programar"><bpmn:incoming>Flow_4</bpmn:incoming><bpmn:outgoing>Flow_6</bpmn:outgoing></bpmn:task>
            <bpmn:task id="Task_4" name="Aprobar"><bpmn:incoming>Flow_6</bpmn:incoming><bpmn:outgoing>Flow_7</bpmn:outgoing></bpmn:task>
            <bpmn:exclusiveGateway id="Gateway_2" name="¿Aprobado?"><bpmn:incoming>Flow_7</bpmn:incoming><bpmn:outgoing>Flow_8</bpmn:outgoing><bpmn:outgoing>Flow_9</bpmn:outgoing></bpmn:exclusiveGateway>
            <bpmn:endEvent id="EndEvent_2" name="Rechazado"><bpmn:incoming>Flow_9</bpmn:incoming></bpmn:endEvent>
            <bpmn:task id="Task_5" name="Pagar"><bpmn:incoming>Flow_8</bpmn:incoming><bpmn:outgoing>Flow_10</bpmn:outgoing></bpmn:task>
            <bpmn:endEvent id="EndEvent_3" name="Fin"><bpmn:incoming>Flow_10</bpmn:incoming></bpmn:endEvent>
            <bpmn:sequenceFlow id="Flow_1" sourceRef="StartEvent_1" targetRef="Task_1" />
            <bpmn:sequenceFlow id="Flow_2" sourceRef="Task_1" targetRef="Task_2" />
            <bpmn:sequenceFlow id="Flow_3" sourceRef="Task_2" targetRef="Gateway_1" />
            <bpmn:sequenceFlow id="Flow_4" name="Sí" sourceRef="Gateway_1" targetRef="Task_3" />
            <bpmn:sequenceFlow id="Flow_5" name="No" sourceRef="Gateway_1" targetRef="EndEvent_1" />
            <bpmn:sequenceFlow id="Flow_6" sourceRef="Task_3" targetRef="Task_4" />
            <bpmn:sequenceFlow id="Flow_7" sourceRef="Task_4" targetRef="Gateway_2" />
            <bpmn:sequenceFlow id="Flow_8" name="Sí" sourceRef="Gateway_2" targetRef="Task_5" />
            <bpmn:sequenceFlow id="Flow_9" name="No" sourceRef="Gateway_2" targetRef="EndEvent_2" />
            <bpmn:sequenceFlow id="Flow_10" sourceRef="Task_5" targetRef="EndEvent_3" />
          </bpmn:process>
          <bpmndi:BPMNDiagram id="BPMNDiagram_1">
            <bpmndi:BPMNPlane id="BPMNPlane_1" bpmnElement="Collaboration_1">
              <bpmndi:BPMNShape id="Participant_Proveedor_di" bpmnElement="Participant_Proveedor" isHorizontal="true"><dc:Bounds x="160" y="80" width="1050" height="60" /></bpmndi:BPMNShape>
              <bpmndi:BPMNShape id="Participant_Empresa_di" bpmnElement="Participant_Empresa" isHorizontal="true"><dc:Bounds x="160" y="180" width="1050" height="450" /></bpmndi:BPMNShape>
              <bpmndi:BPMNShape id="Lane_CxP_di" bpmnElement="Lane_CxP" isHorizontal="true"><dc:Bounds x="190" y="180" width="1020" height="150" /></bpmndi:BPMNShape>
              <bpmndi:BPMNShape id="Lane_Gerencia_di" bpmnElement="Lane_Gerencia" isHorizontal="true"><dc:Bounds x="190" y="330" width="1020" height="150" /></bpmndi:BPMNShape>
              <bpmndi:BPMNShape id="Lane_ERP_di" bpmnElement="Lane_ERP" isHorizontal="true"><dc:Bounds x="190" y="480" width="1020" height="150" /></bpmndi:BPMNShape>
              <bpmndi:BPMNShape id="StartEvent_1_di" bpmnElement="StartEvent_1" bioc:stroke="#1b5e20" bioc:fill="#c8e6c9"><dc:Bounds x="230" y="237" width="36" height="36" /></bpmndi:BPMNShape>
              <bpmndi:BPMNShape id="Task_1_di" bpmnElement="Task_1" bioc:stroke="#0d47a1" bioc:fill="#bbdefb"><dc:Bounds x="310" y="215" width="100" height="80" /></bpmndi:BPMNShape>
              <bpmndi:BPMNShape id="Task_2_di" bpmnElement="Task_2" bioc:stroke="#0d47a1" bioc:fill="#bbdefb"><dc:Bounds x="310" y="515" width="100" height="80" /></bpmndi:BPMNShape>
              <bpmndi:BPMNShape id="Gateway_1_di" bpmnElement="Gateway_1" isMarkerVisible="true" bioc:stroke="#f57f17" bioc:fill="#fff9c4"><dc:Bounds x="460" y="530" width="50" height="50" /></bpmndi:BPMNShape>
              <bpmndi:BPMNShape id="EndEvent_1_di" bpmnElement="EndEvent_1" bioc:stroke="#b71c1c" bioc:fill="#ffcdd2"><dc:Bounds x="467" y="612" width="36" height="36" /></bpmndi:BPMNShape>
              <bpmndi:BPMNShape id="Task_3_di" bpmnElement="Task_3" bioc:stroke="#0d47a1" bioc:fill="#bbdefb"><dc:Bounds x="560" y="215" width="100" height="80" /></bpmndi:BPMNShape>
              <bpmndi:BPMNShape id="Task_4_di" bpmnElement="Task_4" bioc:stroke="#0d47a1" bioc:fill="#bbdefb"><dc:Bounds x="710" y="365" width="100" height="80" /></bpmndi:BPMNShape>
              <bpmndi:BPMNShape id="Gateway_2_di" bpmnElement="Gateway_2" isMarkerVisible="true" bioc:stroke="#f57f17" bioc:fill="#fff9c4"><dc:Bounds x="860" y="380" width="50" height="50" /></bpmndi:BPMNShape>
              <bpmndi:BPMNShape id="EndEvent_2_di" bpmnElement="EndEvent_2" bioc:stroke="#b71c1c" bioc:fill="#ffcdd2"><dc:Bounds x="867" y="452" width="36" height="36" /></bpmndi:BPMNShape>
              <bpmndi:BPMNShape id="Task_5_di" bpmnElement="Task_5" bioc:stroke="#0d47a1" bioc:fill="#bbdefb"><dc:Bounds x="960" y="515" width="100" height="80" /></bpmndi:BPMNShape>
              <bpmndi:BPMNShape id="EndEvent_3_di" bpmnElement="EndEvent_3" bioc:stroke="#b71c1c" bioc:fill="#ffcdd2"><dc:Bounds x="1112" y="537" width="36" height="36" /></bpmndi:BPMNShape>
              <bpmndi:BPMNEdge id="Flow_Msg1_di" bpmnElement="Flow_Msg1"><di:waypoint x="248" y="140" /><di:waypoint x="248" y="237" /></bpmndi:BPMNEdge>
              <bpmndi:BPMNEdge id="Flow_1_di" bpmnElement="Flow_1"><di:waypoint x="266" y="255" /><di:waypoint x="310" y="255" /></bpmndi:BPMNEdge>
              <bpmndi:BPMNEdge id="Flow_2_di" bpmnElement="Flow_2"><di:waypoint x="360" y="295" /><di:waypoint x="360" y="515" /></bpmndi:BPMNEdge>
              <bpmndi:BPMNEdge id="Flow_3_di" bpmnElement="Flow_3"><di:waypoint x="410" y="555" /><di:waypoint x="460" y="555" /></bpmndi:BPMNEdge>
              <bpmndi:BPMNEdge id="Flow_4_di" bpmnElement="Flow_4"><di:waypoint x="485" y="530" /><di:waypoint x="485" y="255" /><di:waypoint x="560" y="255" /></bpmndi:BPMNEdge>
              <bpmndi:BPMNEdge id="Flow_5_di" bpmnElement="Flow_5"><di:waypoint x="485" y="580" /><di:waypoint x="485" y="612" /></bpmndi:BPMNEdge>
              <bpmndi:BPMNEdge id="Flow_6_di" bpmnElement="Flow_6"><di:waypoint x="660" y="255" /><di:waypoint x="685" y="255" /><di:waypoint x="685" y="405" /><di:waypoint x="710" y="405" /></bpmndi:BPMNEdge>
              <bpmndi:BPMNEdge id="Flow_7_di" bpmnElement="Flow_7"><di:waypoint x="810" y="405" /><di:waypoint x="860" y="405" /></bpmndi:BPMNEdge>
              <bpmndi:BPMNEdge id="Flow_8_di" bpmnElement="Flow_8"><di:waypoint x="885" y="430" /><di:waypoint x="885" y="555" /><di:waypoint x="960" y="555" /></bpmndi:BPMNEdge>
              <bpmndi:BPMNEdge id="Flow_9_di" bpmnElement="Flow_9"><di:waypoint x="885" y="430" /><di:waypoint x="885" y="452" /></bpmndi:BPMNEdge>
              <bpmndi:BPMNEdge id="Flow_10_di" bpmnElement="Flow_10"><di:waypoint x="1060" y="555" /><di:waypoint x="1112" y="555" /></bpmndi:BPMNEdge>
            </bpmndi:BPMNPlane>
          </bpmndi:BPMNDiagram>
        </bpmn:definitions>`;

        // --- 2. MODELER INITIALIZATION ---
        const bpmnModeler = new BpmnJS({
            container: '#canvas',
            keyboard: { bindTo: document }
        });

        async function openDiagram(xml) {
            try {
                await bpmnModeler.importXML(xml);
                bpmnModeler.get('canvas').zoom('fit-viewport');
            } catch (err) { console.error('Error BPMN:', err); }
        }

        openDiagram(processEjemploXML);

        // --- 3. LOGIC: INSPECTOR & FLOATING TOOLBAR ---
        const alignToolbar = document.getElementById('align-toolbar');
        const propertiesPanel = document.getElementById('properties-panel');

        bpmnModeler.on('selection.changed', (e) => {
            const selection = e.newSelection || [];
            const alignable = selection.filter(el => 
                !el.type.includes('Flow') && !el.type.includes('Lane') && !el.type.includes('Participant')
            );

            if (alignable.length >= 1) {
                alignToolbar.classList.remove('opacity-0', 'pointer-events-none', '-translate-y-4', 'scale-95');
                alignToolbar.classList.add('opacity-100', 'translate-y-0', 'scale-100');
            } else {
                alignToolbar.classList.add('opacity-0', 'pointer-events-none', '-translate-y-4', 'scale-95');
                alignToolbar.classList.remove('opacity-100', 'translate-y-0', 'scale-100');
            }

            if (selection.length === 1) {
                const el = selection[0];
                if (!el.type.includes('Flow') && !el.type.includes('Lane')) {
                    propertiesPanel.classList.remove('translate-x-full');
                    document.getElementById('element-name').textContent = el.businessObject.name || '(Sin nombre)';
                    document.getElementById('element-type').textContent = el.businessObject.$type.split(':')[1];
                    const docs = el.businessObject.get('documentation');
                    document.getElementById('element-desc').value = (docs && docs.length > 0) ? docs[0].text : '';
                } else { propertiesPanel.classList.add('translate-x-full'); }
            } else { propertiesPanel.classList.add('translate-x-full'); }
        });

        // Corregido: .select(null) en lugar de .clear()
        document.getElementById('btn-close-panel').addEventListener('click', () => {
            propertiesPanel.classList.add('translate-x-full');
            bpmnModeler.get('selection').select(null);
        });

        document.getElementById('element-desc').addEventListener('input', (e) => {
            const sel = bpmnModeler.get('selection').get();
            if (sel.length !== 1) return;
            const modeling = bpmnModeler.get('modeling');
            const factory = bpmnModeler.get('bpmnFactory');
            const doc = factory.create('bpmn:Documentation', { text: e.target.value });
            modeling.updateProperties(sel[0], { documentation: [doc] });
        });

        // --- 4. ALIGNMENT & COLOR ACTIONS ---
        window.colorSelected = (fill, stroke) => {
            const sel = bpmnModeler.get('selection').get();
            if (sel.length > 0) bpmnModeler.get('modeling').setColor(sel, { fill, stroke });
        };

        window.alignSelected = (type) => {
            const sel = bpmnModeler.get('selection').get();
            if (sel.length > 1) bpmnModeler.get('alignElements').trigger(sel, type);
        };

        window.distributeSelected = (axis) => {
            const sel = bpmnModeler.get('selection').get();
            if (sel.length > 2) bpmnModeler.get('distributeElements').trigger(sel, axis);
        };

        document.getElementById('btn-color-theme').addEventListener('click', () => {
            const modeling = bpmnModeler.get('modeling');
            const registry = bpmnModeler.get('elementRegistry');
            const shapes = registry.filter(e => !e.type.includes('Flow') && !e.type.includes('Lane') && !e.type.includes('Participant'));
            shapes.forEach(s => {
                if (s.type === 'bpmn:StartEvent') modeling.setColor([s], { fill: '#c8e6c9', stroke: '#1b5e20' });
                else if (s.type === 'bpmn:EndEvent') modeling.setColor([s], { fill: '#ffcdd2', stroke: '#b71c1c' });
                else if (s.type.includes('Gateway')) modeling.setColor([s], { fill: '#fff9c4', stroke: '#f57f17' });
                else if (s.type.includes('Task')) modeling.setColor([s], { fill: '#bbdefb', stroke: '#0d47a1' });
            });
        });

        // --- 5. LINTER LOGIC ---
        let linterActive = true;
        const linterBtn = document.getElementById('btn-toggle-linter');
        linterBtn.addEventListener('click', () => {
            linterActive = !linterActive;
            document.getElementById('linter-text').textContent = linterActive ? 'Linter ON' : 'Linter OFF';
            document.getElementById('linter-indicator').className = linterActive ? 'w-2 h-2 rounded-full bg-emerald-500 animate-pulse' : 'w-2 h-2 rounded-full bg-slate-500';
            validate();
        });

        function validate() {
            const overlays = bpmnModeler.get('overlays');
            overlays.remove({ type: 'linter' });
            if (!linterActive) return;
            bpmnModeler.get('elementRegistry').getAll().forEach(el => {
                const bo = el.businessObject;
                if (el.type === 'bpmn:StartEvent' && bo.incoming?.length > 0) {
                    overlays.add(el.id, 'linter', { position: { bottom: 0, right: 0 }, html: '<div class="linter-badge" title="Start no puede tener entradas">X</div>' });
                }
                if (el.type.includes('Task') && (!bo.incoming?.length || !bo.outgoing?.length)) {
                    overlays.add(el.id, 'linter', { position: { bottom: 0, right: 0 }, html: '<div class="linter-badge linter-warning" title="Tarea desconectada">!</div>' });
                }
            });
        }
        bpmnModeler.on('commandStack.changed', validate);

        // --- 6. ADVANCED AUTO-LAYOUT ---
        document.getElementById('btn-auto-layout').addEventListener('click', async () => {
            const btn = document.getElementById('btn-auto-layout');
            const icon = document.getElementById('icon-layout');
            icon.classList.add('animate-spin');
            btn.disabled = true;

            try {
                const { xml } = await bpmnModeler.saveXML({ format: true });
                const semanticXml = xml.replace(/<bpmndi:BPMNDiagram[\s\S]*?<\/bpmndi:BPMNDiagram>/g, '');
                
                const { layoutProcess } = await import('https://esm.sh/bpmn-auto-layout@1.3.0');
                const layoutXml = await layoutProcess(semanticXml);

                const parser = new DOMParser();
                const origDoc = parser.parseFromString(xml, "text/xml");
                const layoutDoc = parser.parseFromString(layoutXml, "text/xml");

                const getElements = (root, name) => {
                    const res = [];
                    const walk = (n) => {
                        if (n.nodeType === 1 && (n.localName === name || n.tagName.endsWith(':' + name))) res.push(n);
                        for (let c of n.childNodes) walk(c);
                    };
                    walk(root); return res;
                };

                const layoutData = {};
                getElements(layoutDoc, "BPMNShape").forEach(shape => {
                    const id = shape.getAttribute("bpmnElement");
                    const bounds = getElements(shape, "Bounds")[0];
                    if (bounds) {
                        layoutData[id] = { 
                            x: parseFloat(bounds.getAttribute("x")), 
                            y: parseFloat(bounds.getAttribute("y")), 
                            w: parseFloat(bounds.getAttribute("width")), 
                            h: parseFloat(bounds.getAttribute("height")) 
                        };
                    }
                });

                // Corrección Cross-Pool (Message Flows)
                getElements(origDoc, "messageFlow").forEach(mf => {
                    const src = layoutData[mf.getAttribute("sourceRef")];
                    const tgt = layoutData[mf.getAttribute("targetRef")];
                    if (src && tgt && tgt.x <= src.x + 50) {
                        const shift = (src.x + 150) - tgt.x;
                        Object.values(layoutData).forEach(b => { if (b.x >= tgt.x - 10) b.x += shift; });
                    }
                });

                let minX = Infinity, maxX = 0;
                Object.values(layoutData).forEach(b => { if (b.x < minX) minX = b.x; if (b.x + b.w > maxX) maxX = b.x + b.w; });
                const shiftX = Math.max(0, 120 - minX);
                const poolWidth = Math.max(1000, maxX + shiftX + 100);

                let currentY = 50;
                const parts = getElements(origDoc, "participant").map(p => {
                    const id = p.getAttribute("id");
                    const ref = p.getAttribute("processRef");
                    const shape = getElements(origDoc, "BPMNShape").find(s => s.getAttribute("bpmnElement") === id);
                    const b = shape ? getElements(shape, "Bounds")[0] : null;
                    return { id, ref, origY: b ? parseFloat(b.getAttribute("y")) : 0, bounds: b };
                }).sort((a, b) => a.origY - b.origY);

                parts.forEach(part => {
                    if (!part.bounds) return;
                    part.bounds.setAttribute("x", 50);
                    part.bounds.setAttribute("y", currentY);
                    part.bounds.setAttribute("width", poolWidth);

                    if (!part.ref) {
                        part.bounds.setAttribute("height", 60);
                        currentY += 100;
                    } else {
                        const proc = getElements(origDoc, "process").find(p => p.getAttribute("id") === part.ref);
                        const lanes = getElements(proc, "lane");
                        if (lanes.length > 0) {
                            let pStartY = currentY;
                            const lanesD = lanes.map(l => {
                                const id = l.getAttribute("id");
                                const refs = getElements(l, "flowNodeRef").map(n => n.textContent);
                                const sh = getElements(origDoc, "BPMNShape").find(s => s.getAttribute("bpmnElement") === id);
                                const b = sh ? getElements(sh, "Bounds")[0] : null;
                                return { id, els: refs, origY: b ? parseFloat(b.getAttribute("y")) : 0, bounds: b };
                            }).sort((a, b) => a.origY - b.origY);

                            lanesD.forEach(lane => {
                                let lTop = currentY, lHeight = 150;
                                const sortedIds = lane.els.filter(id => layoutData[id]).sort((a,b) => layoutData[a].x - layoutData[b].x);
                                const placed = [];
                                sortedIds.forEach(id => {
                                    const raw = layoutData[id];
                                    let ex = raw.x + shiftX, ey = lTop + 35;
                                    let overlap = true;
                                    while(overlap) {
                                        overlap = placed.some(p => (ex < p.x + p.w + 20 && ex + raw.w + 20 > p.x && ey < p.y + p.h + 20 && ey + raw.h + 20 > p.y));
                                        if (overlap) ey += 90;
                                    }
                                    placed.push({x:ex, y:ey, w:raw.w, h:raw.h});
                                    const sh = getElements(origDoc, "BPMNShape").find(s => s.getAttribute("bpmnElement") === id);
                                    if (sh) { const b = getElements(sh, "Bounds")[0]; b.setAttribute("x", ex); b.setAttribute("y", ey); }
                                    if (ey + raw.h + 35 - lTop > lHeight) lHeight = ey + raw.h + 35 - lTop;
                                });
                                if (lane.bounds) {
                                    lane.bounds.setAttribute("x", 80); lane.bounds.setAttribute("y", lTop);
                                    lane.bounds.setAttribute("width", poolWidth - 30); lane.bounds.setAttribute("height", lHeight);
                                }
                                currentY += lHeight;
                            });
                            part.bounds.setAttribute("height", currentY - pStartY);
                            currentY += 40;
                        }
                    }
                });

                const finalXml = new XMLSerializer().serializeToString(origDoc);
                await openDiagram(finalXml);

                // Forzar Re-enrutado Manhattan (90 grados)
                setTimeout(() => {
                    const modeling = bpmnModeler.get('modeling');
                    bpmnModeler.get('elementRegistry').filter(e => e.waypoints).forEach(edge => {
                        const s = edge.source, t = edge.target;
                        if (s && t) {
                            const cs = { x: s.x + (s.width||0)/2, y: s.y + (s.height||0)/2 };
                            const ct = { x: t.x + (t.width||0)/2, y: t.y + (t.height||0)/2 };
                            modeling.updateWaypoints(edge, [cs, ct]);
                            modeling.reconnectStart(edge, s, cs);
                            modeling.reconnectEnd(edge, t, ct);
                        }
                    });
                }, 200);

            } catch(e) { console.error(e); alert('Error al rediseñar'); }
            icon.classList.remove('animate-spin');
            btn.disabled = false;
        });

        // --- 7. EXPORT ACTIONS ---
        document.getElementById('btn-import').addEventListener('click', () => document.getElementById('file-input').click());
        document.getElementById('file-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => openDiagram(ev.target.result);
            reader.readAsText(file);
        });

        document.getElementById('btn-download-xml').addEventListener('click', async () => {
            const { xml } = await bpmnModeler.saveXML({ format: true });
            const blob = new Blob([xml], { type: 'application/xml' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'proceso.bpmn'; a.click();
        });

        document.getElementById('btn-download-svg').addEventListener('click', async () => {
            const { svg } = await bpmnModeler.saveSVG();
            const blob = new Blob([svg], { type: 'image/svg+xml' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'proceso.svg'; a.click();
        });

        document.getElementById('btn-export-doc').addEventListener('click', async () => {
            const { svg } = await bpmnModeler.saveSVG();
            const tasks = bpmnModeler.get('elementRegistry').filter(e => e.type.includes('Task') && e.businessObject.name);
            let h = `<html><head><style>body{font-family:sans-serif;padding:50px;color:#1e293b}h1{border-bottom:2px solid #e2e8f0;padding-bottom:10px}.card{margin:20px 0;padding:20px;border:1px solid #e2e8f0;border-radius:10px}.num{background:#2563eb;color:white;width:24px;height:24px;display:inline-block;border-radius:50%;text-align:center;margin-right:10px}</style></head><body><h1>Manual de Procedimiento</h1><div style="text-align:center">${svg}</div>`;
            tasks.forEach((t, i) => {
                const doc = t.businessObject.get('documentation')[0]?.text || 'Sin descripción.';
                h += `<div class="card"><h3><span class="num">${i+1}</span> ${t.businessObject.name}</h3><p>${doc}</p></div>`;
            });
            h += `</body></html>`;
            const blob = new Blob([h], { type: 'text/html' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'manual_procedimientos.html'; a.click();
        });

        document.getElementById('btn-new').addEventListener('click', () => {
            openDiagram(`<?xml version="1.0" encoding="UTF-8"?><bpmn:definitions xmlns:bpmn="http://www.omg.org/spec/BPMN/20100524/MODEL" id="Definitions_1" targetNamespace="http://bpmn.io/schema/bpmn"><bpmn:process id="Process_1" isExecutable="false"><bpmn:startEvent id="StartEvent_1"/></bpmn:process></bpmn:definitions>`);
        });

        document.getElementById('btn-example').addEventListener('click', () => openDiagram(processEjemploXML));
    </script>
</body>
